<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>📅 Бронирование домика</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&display=swap" rel="stylesheet">
    <!-- Flatpickr CSS + русский -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="container py-4">
    <a href="/" class="btn btn-outline-secondary mb-4 rounded-pill"><i class="bi bi-arrow-left"></i> На главную</a>
    <h1>📅 Бронирование домика №${home_id}</h1>
    <p class="lead">Заполните форму, и мы свяжемся с вами</p>

    <form action="/booking" method="post" id="bookingForm">
        <input type="hidden" name="home_id" value="${home_id}">
        <div class="row mt-4">
            <!-- Левая колонка: фото комнат каруселью -->
            <div class="col-md-6 mb-4">
                <div id="roomCarousel" class="carousel slide" data-bs-ride="carousel">
                    <div class="carousel-inner rounded-4 shadow">
                        % for idx, img in enumerate(img_rooms):
                        <div class="carousel-item ${'active' if idx==0 else ''}">
                            <img src="${img}" class="d-block w-100" style="height: 320px; object-fit: cover;" alt="Комната">
                        </div>
                        % endfor
                    </div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#roomCarousel" data-bs-slide="prev">
                        <span class="carousel-control-prev-icon bg-dark rounded-circle p-2"></span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#roomCarousel" data-bs-slide="next">
                        <span class="carousel-control-next-icon bg-dark rounded-circle p-2"></span>
                    </button>
                </div>
                <div class="text-center mt-3">
                    <span class="badge bg-success fs-6 px-4 py-2 rounded-pill">💰 ${price_per_day} ₽ / сутки</span>
                </div>
            </div>

            <!-- Правая колонка: форма -->
            <div class="col-md-6">
                <!-- Поля с flatpickr – клик в любом месте открывает календарь -->
                <div class="mb-3">
                    <label class="form-label"><i class="bi bi-calendar-check"></i> Заезд</label>
                    <input type="text" name="check_in" id="check_in" class="form-control" placeholder="Выберите дату заезда" required>
                </div>
                <div class="mb-3">
                    <label class="form-label"><i class="bi bi-calendar-x"></i> Выезд</label>
                    <input type="text" name="check_out" id="check_out" class="form-control" placeholder="Выберите дату выезда" required>
                </div>
                <div class="mb-3">
                    <label class="form-label"><i class="bi bi-person"></i> Имя</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label"><i class="bi bi-phone"></i> Телефон</label>
                    <input type="tel" name="phone" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label"><i class="bi bi-envelope"></i> Email</label>
                    <input type="email" name="email" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label"><i class="bi bi-geo-alt"></i> Сколько человек?</label>
                    <select name="peoples" class="form-select">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="Больше">Больше</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label"><i class="bi bi-geo-alt"></i> Откуда вы?</label>
                    <select name="departure_city" class="form-select">
                        <option value="Ростов">Ростов</option>
                        <option value="Азов">Азов</option>
                        <option value="Батайск">Батайск</option>
                        <option value="Аксай">Аксай</option>
                        <option value="Таганрог">Таганрог</option>
                        <option value="Другое">Другое</option>
                    </select>
                </div>

                <h5 class="mt-4"><i class="bi bi-plus-circle"></i> Дополнительно</h5>
                <div class="d-flex flex-wrap gap-2 mt-2">
                    <div class="form-check service-check">
                        <input class="form-check-input service" type="checkbox" name="mini_bar" data-price="4000" id="miniBar">
                        <label class="form-check-label" for="miniBar">🍷 Мини-бар +4000 ₽</label>
                    </div>
                    <div class="form-check service-check">
                        <input class="form-check-input service" type="checkbox" name="transfer" data-price="1000" id="transfer">
                        <label class="form-check-label" for="transfer">🚗 Трансфер +1000 ₽</label>
                    </div>
                </div>

                <!-- Итоговая цена -->
                <div class="total-block mt-4 d-flex justify-content-between align-items-center">
                    <span class="fw-bold fs-5">💰 Итого к оплате:</span>
                    <span id="totalPrice" class="fw-bold fs-1 text-success">0</span>
                    <span class="fs-5">₽</span>
                </div>

                <button type="submit" class="btn btn-success w-100 mt-4 rounded-pill py-3 fs-5">
                    <i class="bi bi-check-lg"></i> Забронировать
                </button>
            </div>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Flatpickr JS + русская локализация -->
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ru.js"></script>
<script>
    // Функция пересчёта цены (осталась без изменений, но теперь работает с flatpickr)
    function calculateTotal() {
        let checkIn = document.getElementById('check_in').value;
        let checkOut = document.getElementById('check_out').value;
        let pricePerDay = parseInt('${price_per_day}');
        let days = 0;
        if (checkIn && checkOut) {
            let dateIn = new Date(checkIn);
            let dateOut = new Date(checkOut);
            if (dateOut > dateIn) {
                days = Math.floor((dateOut - dateIn) / (1000 * 60 * 60 * 24));
            }
        }
        let total = days * pricePerDay;
        document.querySelectorAll('.service:checked').forEach(cb => {
            total += parseInt(cb.getAttribute('data-price'));
        });
        document.getElementById('totalPrice').innerText = total > 0 ? total : 0;
    }

    // Инициализация flatpickr для полей дат
    document.addEventListener('DOMContentLoaded', function() {
        // Поле Заезд
        flatpickr("#check_in", {
            locale: "ru",
            dateFormat: "Y-m-d",
            minDate: "today",
            onChange: function(selectedDates, dateStr, instance) {
                // Обновляем минимальную дату для выезда
                if (check_out_flatpickr) {
                    check_out_flatpickr.set('minDate', dateStr);
                }
                calculateTotal();
            }
        });

        // Поле Выезд
        let check_out_flatpickr = flatpickr("#check_out", {
            locale: "ru",
            dateFormat: "Y-m-d",
            minDate: "today",
            onChange: function() {
                calculateTotal();
            }
        });

        // Вешаем пересчёт на чекбоксы
        document.querySelectorAll('.service').forEach(cb => {
            cb.addEventListener('change', calculateTotal);
        });

        // Первый вызов для отображения 0
        calculateTotal();
    });
</script>
</body>
</html>
