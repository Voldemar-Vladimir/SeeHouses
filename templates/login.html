<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в админку</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-5 text-center">
        <h1>🔐 Доступ ограничен</h1>
        <p class="lead">Введите пин-код для входа в панель управления</p>
        <form action="/login" method="post" class="mx-auto" style="max-width: 300px;">
            <div class="mb-3">
                <input type="password" name="pin" class="form-control form-control-lg text-center" placeholder="Пин-код" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100">Войти</button>
        </form>
    </div>
</body>
</html>
